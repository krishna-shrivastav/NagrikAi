<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NagrikAI – Eligibility Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />


  <!-- <link rel="stylesheet" href="style.css" /> -->
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  transition: 0.3s;
}

body.dark {
  background: #0f172a;
  color: white;
}

.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: white;
}

.logo-area {
  display: flex;
  gap: 15px;
  align-items: center;
}

.logo {
  width: 55px;
  border-radius: 12px;
}

#themeToggle {
  background: white;
  border: none;
  padding: 8px 14px;
  border-radius: 12px;
  cursor: pointer;
}

.app-wrapper {
  display: flex;
  padding: 30px;
  gap: 25px;
}

.side-panel {
  width: 350px;
}

.profile-box {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

body.dark .profile-box {
  background: #1e293b;
}

form select,
form input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
}

button[type="submit"] {
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: white;
  border: none;
  padding: 12px;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
}

.chat-container {
  flex: 1;
}

.chat-box {
  background: white;
  border-radius: 20px;
  padding: 20px;
  height: 500px;
  overflow-y: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

body.dark .chat-box {
  background: #1e293b;
}

.bot-msg {
  background: #eef2ff;
  padding: 12px 16px;
  border-radius: 14px;
  margin-bottom: 10px;
  width: fit-content;
}

body.dark .bot-msg {
  background: #334155;
}

.user-msg {
  background: #4f46e5;
  color: white;
  padding: 12px 16px;
  border-radius: 14px;
  margin-bottom: 10px;
  margin-left: auto;
  width: fit-content;
}

.typing {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 10px;
}

.typing span {
  animation: blink 1s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0% { opacity: 0 }
  50% { opacity: 1 }
  100% { opacity: 0 }
}

.app-footer {
  text-align: center;
  padding: 15px;
  font-size: 13px;
  margin-top: 30px;
}

@media (max-width: 900px) {
  .app-wrapper {
    flex-direction: column;
  }
  .side-panel {
    width: 100%;
  }
}
  </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="app-header">
  <img
    src="nagrikailogo.png"
    alt="NagrikAI Logo"
    style="width:70px;margin-bottom:8px;border-radius:16px;"
  />
  <h1>NagrikAI</h1>
  <p>Eligibility Checker</p>
</header>

<!-- ================= MAIN ================= -->
<main class="app-wrapper">

  <!-- ===== LEFT: FORM (SIDE PANEL STYLE) ===== -->
  <aside class="side-panel">

    <div class="profile-box">
      <h4>👤 Your Details</h4>

      <form id="userForm">

        <select name="gender" required>
          <option value="">Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <select name="category" required>
          <option value="">Category</option>
          <option value="General">General</option>
          <option value="OBC">OBC</option>
          <option value="SC">SC</option>
          <option value="ST">ST</option>
        </select>

        <select name="occupation" required>
          <option value="">Occupation</option>
          <option value="farmer">Farmer</option>
          <option value="student">Student</option>
          <option value="business">Business</option>
        </select>

        <input
          type="number"
          name="income"
          placeholder="Annual Income (₹)"
          required
        />

        <select name="state" required>
          <option value="">State</option>
          <option value="MP">Madhya Pradesh</option>
          <option value="UP">Uttar Pradesh</option>
          <option value="Delhi">Delhi</option>
        </select>

        <label style="font-size:13px;margin-top:6px;display:block;">
          <input type="checkbox" name="isStartup" />
          I am a Startup / Entrepreneur
        </label>

        <select name="stage">
          <option value="">Startup Stage (if any)</option>
          <option value="idea">Idea</option>
          <option value="early">Early</option>
          <option value="growth">Growth</option>
        </select>

       <button type="button" id="checkEligibilityBtn">
  Check Eligibility
</button>

      </form>
    </div>

  </aside>

  <!-- ===== RIGHT: RESULT (CHAT CONTAINER STYLE) ===== -->
  <section class="chat-container">

    <div class="chat-box" id="resultBox">
      <div class="bot-msg">
        🤖 Apni details bharo aur eligibility check karo.
      </div>
    </div>

  </section>

</main>

<footer class="app-footer">
  © 2025 NagrikAI
</footer>

<!-- ================= LOGIC ================= -->
<script type="module">
  import { runEligibility } from "./eligibility/eligibilityController.js";

  const form = document.getElementById("userForm");
  const resultBox = document.getElementById("resultBox");

  form.addEventListener("submit", e => {
    e.preventDefault();

    const data = new FormData(form);

    const formData = {
      gender: data.get("gender"),
      category: data.get("category"),
      occupation: data.get("occupation"),
      income: Number(data.get("income")),
      state: data.get("state"),
      isStartup: data.get("isStartup") ? true : false,
      stage: data.get("stage")
    };

    const mode = formData.isStartup ? "startup" : "schemes";
    const response = runEligibility(formData, mode);

    resultBox.innerHTML = "";

    const bot = document.createElement("div");
    bot.className = "bot-msg";

    if (response.results.length === 0) {
      bot.innerText = "❌ Aapke liye koi eligible option nahi mila.";
      resultBox.appendChild(bot);
      return;
    }

    let html = "✅ Eligible Options:<ul>";
    response.results.forEach(r => {
      html += `<li>${r}</li>`;
    });
    html += "</ul>";

    bot.innerHTML = html;
    resultBox.appendChild(bot);
  });
</script>

</body>
</html>
