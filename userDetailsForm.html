<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NagrikAI – Eligibility Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />


  <!-- <link rel="stylesheet" href="style.css" /> -->
  <style>
    /* ========== GLOBAL RESET ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", "Segoe UI", sans-serif;
}

body {
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ========== HEADER ========== */
.app-header {
  text-align: center;
  padding: 25px 20px;
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: white;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.app-header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 1px;
}

.app-header p {
  font-size: 14px;
  opacity: 0.9;
  margin-top: 5px;
}

/* ========== MAIN LAYOUT ========== */
.app-wrapper {
  display: flex;
  flex: 1;
  padding: 30px;
  gap: 25px;
}

/* ========== SIDE PANEL ========== */
.side-panel {
  width: 340px;
}

.profile-box {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(14px);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.profile-box h4 {
  margin-bottom: 18px;
  font-size: 16px;
  color: #4f46e5;
}

/* ========== FORM ELEMENTS ========== */
form select,
form input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  background: #f9fafb;
  font-size: 14px;
  transition: 0.3s;
}

form select:focus,
form input:focus {
  border-color: #6366f1;
  outline: none;
  background: white;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
}

form label {
  font-size: 13px;
  margin-bottom: 10px;
  display: block;
  color: #444;
}

/* ========== BUTTON ========== */
button {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(79,70,229,0.3);
}

/* ========== CHAT CONTAINER ========== */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat-box {
  flex: 1;
  background: white;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  overflow-y: auto;
}

/* ========== BOT MESSAGE ========== */
.bot-msg {
  background: linear-gradient(135deg, #eef2ff, #e0e7ff);
  padding: 15px 18px;
  border-radius: 16px;
  font-size: 14px;
  margin-bottom: 15px;
  animation: fadeIn 0.4s ease-in-out;
}

.bot-msg ul {
  margin-top: 8px;
  padding-left: 18px;
}

.bot-msg li {
  margin-bottom: 6px;
}

/* ========== FOOTER ========== */
.app-footer {
  text-align: center;
  padding: 15px;
  font-size: 13px;
  background: #f1f5f9;
  color: #666;
}

/* ========== ANIMATION ========== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== RESPONSIVE ========== */
@media (max-width: 900px) {
  .app-wrapper {
    flex-direction: column;
  }

  .side-panel {
    width: 100%;
  }
}
  </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="app-header">
  <img
    src="nagrikailogo.png"
    alt="NagrikAI Logo"
    style="width:70px;margin-bottom:8px;border-radius:16px;"
  />
  <h1>NagrikAI</h1>
  <p>Eligibility Checker</p>
</header>

<!-- ================= MAIN ================= -->
<main class="app-wrapper">

  <!-- ===== LEFT: FORM (SIDE PANEL STYLE) ===== -->
  <aside class="side-panel">

    <div class="profile-box">
      <h4>👤 Your Details</h4>

      <form id="userForm">

        <select name="gender" required>
          <option value="">Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <select name="category" required>
          <option value="">Category</option>
          <option value="General">General</option>
          <option value="OBC">OBC</option>
          <option value="SC">SC</option>
          <option value="ST">ST</option>
        </select>

        <select name="occupation" required>
          <option value="">Occupation</option>
          <option value="farmer">Farmer</option>
          <option value="student">Student</option>
          <option value="business">Business</option>
        </select>

        <input
          type="number"
          name="income"
          placeholder="Annual Income (₹)"
          required
        />

        <select name="state" required>
          <option value="">State</option>
          <option value="MP">Madhya Pradesh</option>
          <option value="UP">Uttar Pradesh</option>
          <option value="Delhi">Delhi</option>
        </select>

        <label style="font-size:13px;margin-top:6px;display:block;">
          <input type="checkbox" name="isStartup" />
          I am a Startup / Entrepreneur
        </label>

        <select name="stage">
          <option value="">Startup Stage (if any)</option>
          <option value="idea">Idea</option>
          <option value="early">Early</option>
          <option value="growth">Growth</option>
        </select>

       <button type="button" id="checkEligibilityBtn">
  Check Eligibility
</button>

      </form>
    </div>

  </aside>

  <!-- ===== RIGHT: RESULT (CHAT CONTAINER STYLE) ===== -->
  <section class="chat-container">

    <div class="chat-box" id="resultBox">
      <div class="bot-msg">
        🤖 Apni details bharo aur eligibility check karo.
      </div>
    </div>

  </section>

</main>

<footer class="app-footer">
  © 2025 NagrikAI
</footer>

<!-- ================= LOGIC ================= -->
<script type="module">
  import { runEligibility } from "./eligibility/eligibilityController.js";

  const form = document.getElementById("userForm");
  const resultBox = document.getElementById("resultBox");

  form.addEventListener("submit", e => {
    e.preventDefault();

    const data = new FormData(form);

    const formData = {
      gender: data.get("gender"),
      category: data.get("category"),
      occupation: data.get("occupation"),
      income: Number(data.get("income")),
      state: data.get("state"),
      isStartup: data.get("isStartup") ? true : false,
      stage: data.get("stage")
    };

    const mode = formData.isStartup ? "startup" : "schemes";
    const response = runEligibility(formData, mode);

    resultBox.innerHTML = "";

    const bot = document.createElement("div");
    bot.className = "bot-msg";

    if (response.results.length === 0) {
      bot.innerText = "❌ Aapke liye koi eligible option nahi mila.";
      resultBox.appendChild(bot);
      return;
    }

    let html = "✅ Eligible Options:<ul>";
    response.results.forEach(r => {
      html += `<li>${r}</li>`;
    });
    html += "</ul>";

    bot.innerHTML = html;
    resultBox.appendChild(bot);
  });
</script>

</body>
</html>
